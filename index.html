<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報Ⅰ 文系最速攻略ドリル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #060a10;
  --surface:  #0d1520;
  --surface2: #111d2e;
  --border:   #1e3048;
  --accent:   #00d4ff;
  --accent2:  #0099bb;
  --gold:     #ffd700;
  --green:    #00ff88;
  --red:      #ff4d6d;
  --text:     #ddeeff;
  --muted:    #6a8fb0;
  --glow: 0 0 20px rgba(0,212,255,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- BG grid ---- */
body::before {
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}

.wrap {
  position:relative;z-index:1;
  max-width:520px;
  margin:0 auto;
  padding:20px 16px 80px;
}

/* ---- Header ---- */
.site-header {
  text-align:center;
  padding: 28px 0 20px;
  animation: fadeDown 0.6s ease both;
}
.site-header .sub {
  font-size:0.68em;
  letter-spacing:0.25em;
  color: var(--accent);
  text-transform:uppercase;
  margin-bottom:8px;
}
.site-header h1 {
  font-size:1.55em;
  font-weight:900;
  line-height:1.3;
  background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ---- Score HUD ---- */
.hud {
  display:flex;
  gap:10px;
  margin-bottom:18px;
  animation: fadeDown 0.6s 0.1s ease both;
}
.hud-item {
  flex:1;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
}
.hud-item .val {
  font-family:'JetBrains Mono',monospace;
  font-size:1.7em;
  font-weight:700;
  line-height:1;
}
.hud-item .lbl {
  font-size:0.62em;
  color:var(--muted);
  margin-top:4px;
  letter-spacing:0.05em;
}
.hud-correct .val  { color:var(--green); }
.hud-wrong .val    { color:var(--red); }
.hud-score .val    { color:var(--gold); }

/* ---- Main card ---- */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:26px 22px;
  position:relative;
  overflow:hidden;
  animation: fadeUp 0.5s 0.2s ease both;
}
.card::before {
  content:'';
  position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;
  background: radial-gradient(circle, rgba(0,212,255,0.08), transparent 70%);
  pointer-events:none;
}

/* Progress bar */
.progress-bar-wrap {
  height:4px;
  background:var(--border);
  border-radius:99px;
  margin-bottom:20px;
  overflow:hidden;
}
.progress-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius:99px;
  transition: width 0.5s ease;
  box-shadow:var(--glow);
}
.progress-label {
  font-size:0.7em;
  color:var(--muted);
  text-align:right;
  margin-bottom:8px;
  letter-spacing:0.05em;
}

/* Category badge */
.cat-badge {
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:0.68em;
  font-weight:700;
  letter-spacing:0.1em;
  padding:4px 12px;
  border-radius:20px;
  margin-bottom:16px;
  background: rgba(0,212,255,0.1);
  color: var(--accent);
  border:1px solid rgba(0,212,255,0.25);
  text-transform:uppercase;
}

/* Question */
.question-box {
  font-size:1.08em;
  font-weight:700;
  line-height:1.85;
  color:#eef6ff;
  min-height:80px;
  margin-bottom:22px;
  border-left:3px solid var(--accent);
  padding-left:14px;
}

/* Timer bar */
.timer-wrap {
  margin-bottom:18px;
}
.timer-bar-bg {
  height:6px;
  background:var(--border);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:6px;
}
.timer-bar {
  height:100%;
  border-radius:99px;
  transition: width 1s linear, background 1s linear;
  background: var(--green);
}
.timer-text {
  font-family:'JetBrains Mono',monospace;
  font-size:0.78em;
  color:var(--muted);
  text-align:right;
}

/* Input */
.input-field {
  width:100%;
  padding:14px 16px;
  font-size:1.1em;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  background:var(--bg);
  color:var(--text);
  border:2px solid var(--border);
  border-radius:10px;
  outline:none;
  text-align:center;
  transition:border-color 0.2s, box-shadow 0.2s;
  margin-bottom:12px;
}
.input-field:focus {
  border-color:var(--accent);
  box-shadow:var(--glow);
}
.input-field:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

/* Buttons */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:900;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:1em;
  transition:transform 0.1s, opacity 0.15s, box-shadow 0.2s;
  margin-bottom:10px;
  letter-spacing:0.05em;
}
.btn:hover { opacity:0.88; transform:translateY(-2px); }
.btn:active { transform:translateY(0); }

.btn-check {
  background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
  color:#000;
  box-shadow:0 4px 20px rgba(0,212,255,0.3);
}
.btn-next {
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  display:none;
}

/* Result */
.result-area {
  display:none;
  border-radius:12px;
  overflow:hidden;
  margin-top:4px;
  animation: fadeUp 0.3s ease;
}
.result-header {
  padding:14px 18px;
  font-weight:900;
  font-size:1.05em;
  display:flex;
  align-items:center;
  gap:8px;
}
.result-correct-h { background:rgba(0,255,136,0.15); color:var(--green); border:1px solid rgba(0,255,136,0.3); border-bottom:none; }
.result-wrong-h   { background:rgba(255,77,109,0.15); color:var(--red);   border:1px solid rgba(255,77,109,0.3); border-bottom:none; }

.result-explain {
  padding:16px 18px;
  font-size:0.88em;
  line-height:1.9;
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 12px 12px;
}
.result-explain .step {
  display:flex;
  gap:8px;
  margin:4px 0;
}
.step-num {
  width:20px;height:20px;
  background:var(--accent);
  color:#000;
  border-radius:50%;
  font-size:0.72em;
  font-weight:900;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:3px;
}

/* ---- Result screen ---- */
#final-screen {
  display:none;
  text-align:center;
  animation: fadeUp 0.5s ease;
}
.final-title {
  font-size:1.8em;
  font-weight:900;
  background: linear-gradient(135deg, var(--gold), #ffaa00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
}
.final-score {
  font-family:'JetBrains Mono',monospace;
  font-size:3.5em;
  font-weight:700;
  color:var(--gold);
  text-shadow:0 0 30px rgba(255,215,0,0.5);
  line-height:1;
  margin: 16px 0;
}
.final-grade {
  font-size:1.1em;
  color:var(--muted);
  margin-bottom:24px;
}
.final-msg {
  font-size:0.95em;
  line-height:1.8;
  color:var(--text);
  margin-bottom:24px;
  padding:16px;
  background:var(--surface2);
  border-radius:12px;
  border:1px solid var(--border);
}

/* ---- Hall of Fame ---- */
.hof-section {
  margin-top:28px;
  animation: fadeDown 0.6s 0.3s ease both;
}
.hof-title {
  font-size:0.72em;
  letter-spacing:0.2em;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.hof-title::before, .hof-title::after {
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3));
}
.hof-title::after { transform:scaleX(-1); }
.hof-row {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:6px;
  font-size:0.88em;
}
.hof-rank {
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  width:28px;
  text-align:center;
  font-size:1em;
  flex-shrink:0;
}
.rank-1 { color:var(--gold); }
.rank-2 { color:#c0c0c0; }
.rank-3 { color:#cd7f32; }
.hof-name { flex:1; font-weight:700; }
.hof-score {
  font-family:'JetBrains Mono',monospace;
  color:var(--gold);
  font-weight:700;
}
.hof-date { color:var(--muted); font-size:0.8em; }
.hof-empty { color:var(--muted); font-size:0.85em; padding:10px 0; text-align:center; }

/* ---- Name input for HOF ---- */
.name-input-row {
  display:flex;gap:8px;
  margin-top:16px;
}
.name-input {
  flex:1;
  padding:10px 14px;
  background:var(--bg);
  color:var(--text);
  border:2px solid var(--border);
  border-radius:8px;
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:0.95em;
  outline:none;
}
.name-input:focus { border-color:var(--gold); }
.btn-register {
  padding:10px 18px;
  background:linear-gradient(135deg,#aa8800,var(--gold));
  color:#000;
  border:none;border-radius:8px;
  cursor:pointer;
  font-weight:900;
  font-family:'Zen Kaku Gothic New',sans-serif;
  white-space:nowrap;
  transition:opacity 0.15s;
}
.btn-register:hover { opacity:0.85; }

/* ---- Promo banner ---- */
.promo-wrap {
  margin-top:24px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.promo-card {
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-radius:12px;
  text-decoration:none;
  transition: transform 0.15s, box-shadow 0.15s;
  cursor:pointer;
}
.promo-card:hover { transform:translateY(-2px); }
.promo-youtube {
  background:linear-gradient(135deg,#1a0000,#330000);
  border:1px solid rgba(255,0,0,0.3);
  box-shadow:0 4px 20px rgba(255,0,0,0.1);
}
.promo-booth {
  background:linear-gradient(135deg,#000d1a,#001533);
  border:1px solid rgba(0,212,255,0.25);
  box-shadow:0 4px 20px rgba(0,212,255,0.1);
}
.promo-icon { font-size:1.8em; flex-shrink:0; }
.promo-body .promo-sub  { font-size:0.62em; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }
.promo-body .promo-main { font-size:0.92em; font-weight:700; color:var(--text); margin-top:2px; }
.promo-body .promo-desc { font-size:0.75em; color:var(--muted); margin-top:2px; }
.promo-arrow { margin-left:auto; color:var(--muted); font-size:0.9em; }

/* ---- Retry button ---- */
.btn-retry {
  margin-top:16px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
}

/* ---- Animations ---- */
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 10px rgba(0,212,255,0.2); }
  50%      { box-shadow: 0 0 30px rgba(0,212,255,0.5); }
}

/* confetti canvas */
#confetti-canvas {
  position:fixed;inset:0;
  pointer-events:none;
  z-index:999;
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="wrap">
  <!-- Header -->
  <header class="site-header">
    <div class="sub">情報Ⅰ 受験対策</div>
    <h1>文系最速攻略ドリル</h1>
  </header>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-item hud-correct">
      <div class="val" id="hud-correct">0</div>
      <div class="lbl">正解</div>
    </div>
    <div class="hud-item hud-wrong">
      <div class="val" id="hud-wrong">0</div>
      <div class="lbl">不正解</div>
    </div>
    <div class="hud-item hud-score">
      <div class="val" id="hud-score">0</div>
      <div class="lbl">スコア</div>
    </div>
  </div>

  <!-- Quiz card -->
  <div class="card" id="quiz-card">
    <div class="progress-label"><span id="q-num">1</span> / 10</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:10%"></div>
    </div>

    <div class="cat-badge" id="cat-badge">📊 計算</div>
    <div class="question-box" id="q-text">読み込み中...</div>

    <div class="timer-wrap">
      <div class="timer-bar-bg">
        <div class="timer-bar" id="timer-bar" style="width:100%"></div>
      </div>
      <div class="timer-text">⏱ <span id="timer-val">30</span> 秒</div>
    </div>

    <input type="text" class="input-field" id="user-ans" placeholder="答えを半角で入力" autocomplete="off">

    <button class="btn btn-check" id="check-btn" onclick="checkAnswer()">判定する</button>
    <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">次の問題へ ▶</button>

    <div class="result-area" id="result-area">
      <div class="result-header" id="result-header"></div>
      <div class="result-explain" id="result-explain"></div>
    </div>
  </div>

  <!-- Hall of Fame -->
  <div class="hof-section" id="hof-section">
    <div class="hof-title">🏆 殿堂入りランキング</div>
    <div id="hof-list"></div>
  </div>

  <!-- Final screen -->
  <div id="final-screen" class="card">
    <div class="final-title">🎉 全問終了！</div>
    <div class="final-score" id="final-score">0点</div>
    <div class="final-grade" id="final-grade"></div>
    <div class="final-msg" id="final-msg"></div>

    <div id="hof-register-area">
      <div style="font-size:0.82em;color:var(--muted);margin-bottom:8px;">📛 ランキングに登録する</div>
      <div class="name-input-row">
        <input type="text" class="name-input" id="hof-name" placeholder="ニックネームを入力" maxlength="10">
        <button class="btn-register" onclick="registerHOF()">登録</button>
      </div>
    </div>

    <!-- プロモバナー -->
    <div class="promo-wrap">
      <a class="promo-card promo-youtube" href="https://www.youtube.com/@片野ツール工房" target="_blank" rel="noopener">
        <div class="promo-icon">▶️</div>
        <div class="promo-body">
          <div class="promo-sub">YouTube</div>
          <div class="promo-main">片野ツール工房チャンネル</div>
          <div class="promo-desc">解説動画・勉強法を毎週配信中！</div>
        </div>
        <div class="promo-arrow">›</div>
      </a>
      <a class="promo-card promo-booth" href="https://hiro3tu.booth.pm" target="_blank" rel="noopener">
        <div class="promo-icon">🛒</div>
        <div class="promo-body">
          <div class="promo-sub">BOOTH</div>
          <div class="promo-main">有料版（全30問）を販売中</div>
          <div class="promo-desc">より多くの問題で本番力を強化！</div>
        </div>
        <div class="promo-arrow">›</div>
      </a>
    </div>

    <button class="btn btn-retry" onclick="retryAll()">🔄 もう一度チャレンジ</button>
  </div>
</div>

<script>
/* ===== PROBLEM BANK ===== */
const problems = [
  {
    cat: "🔢 2進数変換",
    gen() {
      const n = Math.floor(Math.random()*10)+10;
      const bin = n.toString(2);
      let steps = []; let x=n;
      while(x>0){ steps.push(`${x} ÷ 2 = ${Math.floor(x/2)} … 余り <b>${x%2}</b>`); x=Math.floor(x/2); }
      return {
        q: `10進数「<b>${n}</b>」を 2進数に変換しなさい。`,
        a: bin,
        ex: [
          {n:1, t:"2で割り続けて余りを記録します"},
          {n:2, t: steps.join("<br>　　")},
          {n:3, t:`余りを下から読むと → <b>${bin}</b>`}
        ]
      };
    }
  },
  {
    cat: "🖼️ 画像容量",
    gen() {
      return {
        q: "横100、縦100ピクセルの<b>白黒2値画像</b>のデータ量は何ビットですか？",
        a: "10000",
        ex: [
          {n:1, t:"2値画像は1ピクセル = 1ビット"},
          {n:2, t:"100 × 100 × 1 = <b>10000 ビット</b>"}
        ]
      };
    }
  },
  {
    cat: "🖼️ 画像容量",
    gen() {
      const w = 1000;
      const bits = w*1000*24;
      const bytes = bits/8;
      const mb = bytes/1000000;
      return {
        q: `横${w}×縦1000ピクセル・<b>24ビットカラー</b>画像の容量は何MBですか？<br><small>（1MB = 1,000,000B）</small>`,
        a: mb.toString(),
        ex: [
          {n:1, t:`総ビット数: 1000 × 1000 × 24 = <b>${bits.toLocaleString()} bit</b>`},
          {n:2, t:`バイト変換: ÷8 → <b>${bytes.toLocaleString()} B</b>`},
          {n:3, t:`MB変換: ÷1,000,000 → <b>${mb} MB</b>`}
        ]
      };
    }
  },
  {
    cat: "🐍 Python",
    gen() {
      return {
        q: "Python の <b>range(1, 5)</b> で繰り返される<b>回数</b>は？",
        a: "4",
        ex: [
          {n:1, t:"range(開始, 終了) は 終了の値を含まない"},
          {n:2, t:"1, 2, 3, 4 → 合計 <b>4回</b>"},
          {n:3, t:"回数 = 終了 − 開始 = 5 − 1 = 4"}
        ]
      };
    }
  },
  {
    cat: "🌐 ネットワーク",
    gen() {
      return {
        q: "<b>80Mbps</b> の回線で <b>10MB</b> のデータを送るのにかかる時間は<b>何秒</b>ですか？",
        a: "1",
        ex: [
          {n:1, t:"単位を揃える: 10MB × 8 = <b>80Mbit</b>"},
          {n:2, t:"時間 = データ ÷ 速度 = 80Mbit ÷ 80Mbps = <b>1秒</b>"}
        ]
      };
    }
  },
  {
    cat: "🔣 16進数",
    gen() {
      return {
        q: "16進数の「<b>A</b>」を 10進数に変換すると？",
        a: "10",
        ex: [
          {n:1, t:"16進数の対応表: A=10, B=11, C=12, D=13, E=14, F=15"},
          {n:2, t:"A = <b>10</b>"}
        ]
      };
    }
  },
  {
    cat: "⚡ 論理回路",
    gen() {
      return {
        q: "入力 A=1, B=1 のとき、<b>AND回路</b>の出力は？",
        a: "1",
        ex: [
          {n:1, t:"AND回路は「両方が1のときだけ1」を出力する"},
          {n:2, t:"A=1 かつ B=1 → <b>出力=1</b>"}
        ]
      };
    }
  },
  {
    cat: "🎵 標本化",
    gen() {
      return {
        q: "<b>40kHz</b> でサンプリングするとき、1秒間のサンプル数は？",
        a: "40000",
        ex: [
          {n:1, t:"k（キロ）= 1,000"},
          {n:2, t:"40 kHz = 40 × 1,000 = <b>40,000 回/秒</b>"}
        ]
      };
    }
  },
  {
    cat: "🔐 セキュリティ",
    gen() {
      return {
        q: "公開鍵暗号で、送信者が暗号化に使う鍵は受信者の何鍵？（漢字3文字）",
        a: "公開鍵",
        ex: [
          {n:1, t:"送信者は受信者の <b>公開鍵</b> で暗号化する"},
          {n:2, t:"受信者は自分の <b>秘密鍵</b> で復号する"},
          {n:3, t:"公開鍵は誰でも使える、秘密鍵は本人だけが持つ"}
        ]
      };
    }
  },
  {
    cat: "💻 アルゴリズム",
    gen() {
      return {
        q: "以下のコードを実行した後の <b>x</b> の値は？<br><code style='background:#060a10;padding:4px 8px;border-radius:5px;font-family:JetBrains Mono,monospace;'>x = 10<br>x = x + 5</code>",
        a: "15",
        ex: [
          {n:1, t:"右辺を先に計算: x + 5 = 10 + 5 = <b>15</b>"},
          {n:2, t:"その値をxに上書き代入 → x = <b>15</b>"}
        ]
      };
    }
  }
];

/* ===== STATE ===== */
let qIndex = 0;
let correct = 0, wrong = 0, score = 0;
let timerInterval = null;
let timeLeft = 30;
let answered = false;
let currentProblem = null;

/* ===== TIMER ===== */
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 30;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      autoTimeUp();
    }
  }, 1000);
}

function updateTimerUI() {
  const ratio = timeLeft / 30;
  const bar = document.getElementById('timer-bar');
  const txt = document.getElementById('timer-val');
  bar.style.width = (ratio * 100) + '%';
  txt.textContent = timeLeft;
  if (ratio > 0.5) bar.style.background = 'var(--green)';
  else if (ratio > 0.25) bar.style.background = 'var(--gold)';
  else bar.style.background = 'var(--red)';
}

function autoTimeUp() {
  if (answered) return;
  answered = true;
  wrong++;
  score = Math.max(0, score);
  updateHUD();
  showResult(false, "⏰ 時間切れ！");
}

/* ===== QUIZ LOGIC ===== */
function loadQuestion() {
  answered = false;
  currentProblem = problems[qIndex].gen();

  document.getElementById('cat-badge').innerHTML = problems[qIndex].cat;
  document.getElementById('q-text').innerHTML = currentProblem.q;
  document.getElementById('q-num').textContent = qIndex + 1;
  document.getElementById('progress-fill').style.width = ((qIndex+1)/10*100)+'%';
  document.getElementById('user-ans').value = '';
  document.getElementById('user-ans').disabled = false;
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('check-btn').style.display = 'block';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('user-ans').focus();

  startTimer();
}

function checkAnswer() {
  if (answered) return;
  const userAns = document.getElementById('user-ans').value.trim();
  if (!userAns) return;
  clearInterval(timerInterval);
  answered = true;

  const isCorrect = userAns === currentProblem.a;
  if (isCorrect) {
    correct++;
    const bonus = Math.ceil(timeLeft / 3);
    score += 10 + bonus;
  } else {
    wrong++;
  }
  updateHUD();
  showResult(isCorrect, null);
}

function showResult(isCorrect, overrideMsg) {
  document.getElementById('user-ans').disabled = true;
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';

  const area = document.getElementById('result-area');
  const hdr  = document.getElementById('result-header');
  const exp  = document.getElementById('result-explain');

  area.style.display = 'block';
  if (isCorrect) {
    hdr.className = 'result-header result-correct-h';
    hdr.innerHTML = '✅ 正解！ナイス！';
    launchConfetti();
  } else {
    hdr.className = 'result-header result-wrong-h';
    hdr.innerHTML = overrideMsg
      ? `${overrideMsg} 正解は「${currentProblem.a}」`
      : `❌ 惜しい！正解は「<b>${currentProblem.a}</b>」`;
  }

  let html = '';
  currentProblem.ex.forEach(s => {
    html += `<div class="step"><div class="step-num">${s.n}</div><div>${s.t}</div></div>`;
  });
  exp.innerHTML = html;
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= 10) {
    showFinal();
  } else {
    loadQuestion();
  }
}

function updateHUD() {
  document.getElementById('hud-correct').textContent = correct;
  document.getElementById('hud-wrong').textContent = wrong;
  document.getElementById('hud-score').textContent = score;
}

/* ===== FINAL ===== */
function showFinal() {
  document.getElementById('quiz-card').style.display = 'none';
  const fs = document.getElementById('final-screen');
  fs.style.display = 'block';

  document.getElementById('final-score').textContent = score + '点';

  let grade, msg;
  if (score >= 130) { grade = '🏆 満点クラス！'; msg = '完璧です！情報Ⅰは余裕で突破できます。\n有料版でさらに高みを目指しましょう！'; }
  else if (score >= 100) { grade = '💎 優秀！'; msg = 'あと少しで満点レベルです！\n苦手な分野を有料版で強化しましょう。'; }
  else if (score >= 70)  { grade = '⭐ まあまあ！'; msg = '基礎は固まっています！\n計算問題の速度アップが次のステップです。'; }
  else { grade = '💪 まだまだこれから！'; msg = '繰り返し練習がカギです。\nYouTube解説動画も活用してください！'; }

  document.getElementById('final-grade').textContent = grade;
  document.getElementById('final-msg').textContent = msg;
  renderHOF();
  launchConfetti(80);
}

/* ===== HALL OF FAME ===== */
const HOF_KEY = 'jyoho1_hof_v1';

function getHOF() {
  try { return JSON.parse(localStorage.getItem(HOF_KEY) || '[]'); } catch{ return []; }
}
function saveHOF(data) {
  localStorage.setItem(HOF_KEY, JSON.stringify(data));
}

function registerHOF() {
  const name = document.getElementById('hof-name').value.trim();
  if (!name) { alert('ニックネームを入力してください'); return; }
  const hof = getHOF();
  hof.push({ name, score, date: new Date().toLocaleDateString('ja-JP') });
  hof.sort((a,b) => b.score - a.score);
  saveHOF(hof.slice(0,10));
  document.getElementById('hof-register-area').innerHTML = '<div style="color:var(--green);font-weight:700;padding:10px 0;">✅ 登録しました！</div>';
  renderHOF();
}

function renderHOF() {
  const hof = getHOF();
  const medals = ['🥇','🥈','🥉'];
  const section = document.getElementById('hof-section');
  const list = document.getElementById('hof-list');
  section.style.display = 'block';
  if (!hof.length) {
    list.innerHTML = '<div class="hof-empty">まだ記録がありません</div>';
    return;
  }
  list.innerHTML = hof.slice(0,5).map((e,i) => `
    <div class="hof-row">
      <div class="hof-rank rank-${i+1}">${medals[i] || (i+1)}</div>
      <div class="hof-name">${e.name}</div>
      <div class="hof-score">${e.score}pt</div>
      <div class="hof-date">${e.date}</div>
    </div>
  `).join('');
}

function retryAll() {
  qIndex=0; correct=0; wrong=0; score=0;
  updateHUD();
  document.getElementById('final-screen').style.display='none';
  document.getElementById('quiz-card').style.display='block';
  loadQuestion();
}

/* ===== CONFETTI ===== */
function launchConfetti(count=40) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#00d4ff','#ffd700','#00ff88','#ff4d6d','#ffffff'];
  const pieces = Array.from({length:count}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height*0.3 - canvas.height*0.3,
    r: Math.random()*6+3,
    d: Math.random()*count,
    color: colors[Math.floor(Math.random()*colors.length)],
    tilt: Math.random()*10-5,
    tiltAngle: 0,
    tiltSpeed: Math.random()*0.1+0.05,
    speed: Math.random()*3+1
  }));

  let frame=0;
  const anim = () => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r, p.r*0.5, p.tilt, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.y += p.speed;
      p.tiltAngle += p.tiltSpeed;
      p.tilt = Math.sin(p.tiltAngle)*12;
      p.x += Math.sin(frame/30)*0.5;
    });
    frame++;
    if(frame < 150) requestAnimationFrame(anim);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  };
  anim();
}

/* ===== ENTER KEY ===== */
document.addEventListener('keydown', e => { if(e.key==='Enter') checkAnswer(); });

/* ===== INIT ===== */
renderHOF();
loadQuestion();
</script>
